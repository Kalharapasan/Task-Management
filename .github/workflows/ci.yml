name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend (lint, install, DB smoke test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ALLOW_EMPTY_PASSWORD: yes
          MYSQL_DATABASE: task_management
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Syntax-check all source files
        run: |
          for f in $(find src database api -name "*.js"); do
            node --check "$f"
          done

      - name: Load database schema
        run: mysql -h 127.0.0.1 -u root < database/schema.sql

      - name: Run automated tests (Jest + Supertest)
        env:
          DB_HOST: sql12.freesqldatabase.com
          DB_PORT: 3306
          DB_USER: sql12833613
          DB_PASSWORD: 'pEnw7u4WGk'
          DB_NAME: sql12833613
          JWT_SECRET: 3c9f1e8b7a4d2f6c9a1e5b8d7f2c4a9e6b1d8f3a7c5e9f2b4d6a8c1e3f5b7d9
          JWT_REFRESH_SECRET: 8e4a2c7f1d9b6e3a5f8c2d7b9a1e4f6c3b8d5a2f7e9c1d4b6a3f8e5c2d7b9a1
        run: npm test

      - name: Boot the API and smoke-test the health + login endpoints
        env:
          PORT: 5000
          NODE_ENV: test
          CLIENT_URL: http://localhost:5173
          DB_HOST: sql12.freesqldatabase.com
          DB_PORT: 3306
          DB_NAME: sql12833613
          DB_USER: sql12833613
          DB_PASSWORD: 'pEnw7u4WGk'
          JWT_SECRET: 3c9f1e8b7a4d2f6c9a1e5b8d7f2c4a9e6b1d8f3a7c5e9f2b4d6a8c1e3f5b7d9
          JWT_REFRESH_SECRET: 8e4a2c7f1d9b6e3a5f8c2d7b9a1e4f6c3b8d5a2f7e9c1d4b6a3f8e5c2d7b9a1
          ACCESS_TOKEN_EXPIRES_IN: 15m
          REFRESH_TOKEN_EXPIRES_IN: 7d
        run: |
          node src/server.js &
          SERVER_PID=$!
          sleep 3

          HEALTH=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:5000/api/health)
          if [ "$HEALTH" != "200" ]; then
            echo "Health check failed (HTTP $HEALTH)"
            kill $SERVER_PID
            exit 1
          fi

          LOGIN_STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST http://localhost:5000/api/auth/login \
            -H "Content-Type: application/json" \
            -d '{"email":"admin@test.com","password":"123456"}')
          if [ "$LOGIN_STATUS" != "200" ]; then
            echo "Login smoke test failed (HTTP $LOGIN_STATUS)"
            kill $SERVER_PID
            exit 1
          fi

          echo "Backend smoke test passed."
          kill $SERVER_PID

  frontend:
    name: Frontend (install, build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build production bundle
        env:
          VITE_API_BASE_URL: http://localhost:5000/api
        run: npm run build
