name: CI

# Runs on every push and pull request so broken code never reaches main.
# Two independent jobs (backend/frontend) run in parallel; the backend job
# spins up a real MySQL service container so the schema and a basic API
# smoke test run against an actual database, not just a syntax check.

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend (lint, install, DB smoke test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ALLOW_EMPTY_PASSWORD: yes
          MYSQL_DATABASE: task_management
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Syntax-check all source files
        run: |
          for f in $(find src database api -name "*.js"); do
            node --check "$f"
          done

      - name: Load database schema
        run: mysql -h 127.0.0.1 -u root < database/schema.sql

      - name: Boot the API and smoke-test the health + login endpoints
        env:
          PORT: 5000
          NODE_ENV: test
          CLIENT_URL: http://localhost:5173
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_NAME: task_management
          DB_USER: root
          DB_PASSWORD: ''
          JWT_SECRET: ci_test_secret
          JWT_REFRESH_SECRET: ci_test_refresh_secret
          ACCESS_TOKEN_EXPIRES_IN: 15m
          REFRESH_TOKEN_EXPIRES_IN: 7d
        run: |
          node src/server.js &
          SERVER_PID=$!
          sleep 3

          HEALTH=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:5000/api/health)
          if [ "$HEALTH" != "200" ]; then
            echo "Health check failed (HTTP $HEALTH)"
            kill $SERVER_PID
            exit 1
          fi

          LOGIN_STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST http://localhost:5000/api/auth/login \
            -H "Content-Type: application/json" \
            -d '{"email":"admin@test.com","password":"123456"}')
          if [ "$LOGIN_STATUS" != "200" ]; then
            echo "Login smoke test failed (HTTP $LOGIN_STATUS)"
            kill $SERVER_PID
            exit 1
          fi

          echo "Backend smoke test passed."
          kill $SERVER_PID

  frontend:
    name: Frontend (install, build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build production bundle
        env:
          VITE_API_BASE_URL: http://localhost:5000/api
        run: npm run build
