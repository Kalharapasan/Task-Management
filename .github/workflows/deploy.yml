name: Deploy to Vercel

# Deploys the backend and frontend as two separate Vercel projects
# whenever main is updated. Requires these repository secrets to be set
# under Settings -> Secrets and variables -> Actions (see README.md
# "CI/CD & Deployment" section for how to obtain each value):
#
#   VERCEL_TOKEN                 - personal/team API token from vercel.com/account/tokens
#   VERCEL_ORG_ID                - shared by both projects
#   VERCEL_PROJECT_ID_BACKEND    - Project ID of the backend Vercel project
#   VERCEL_PROJECT_ID_FRONTEND   - Project ID of the frontend Vercel project
#   VITE_API_BASE_URL            - e.g. https://your-backend.vercel.app/api
#
# Each job uses the standard `vercel pull` -> `vercel build` -> `vercel deploy
# --prebuilt` flow recommended by Vercel for CI-driven deployments, so the
# exact same build Vercel would produce locally is what gets shipped.

on:
  push:
    branches: [main]
  workflow_dispatch: {}

jobs:
  deploy-backend:
    name: Deploy backend to Vercel
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Pull Vercel environment settings
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_BACKEND }}

      - name: Build (Vercel)
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_BACKEND }}

      - name: Deploy prebuilt output to production
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_BACKEND }}

  deploy-frontend:
    name: Deploy frontend to Vercel
    runs-on: ubuntu-latest
    # Deploy the frontend after the backend so, on the very first deploy,
    # the backend URL is already live before the frontend build points at it.
    needs: deploy-backend
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Pull Vercel environment settings
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_FRONTEND }}

      - name: Build (Vercel)
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_FRONTEND }}
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}

      - name: Deploy prebuilt output to production
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_FRONTEND }}
