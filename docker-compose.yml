version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: task-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpassword}
      MYSQL_DATABASE: task_management
    ports:
      - '3306:3306'
    volumes:
      - mysql_data:/var/lib/mysql
      - ./backend/database/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    healthcheck:
      test: ['CMD', 'mysqladmin', 'ping', '-h', 'localhost']
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    container_name: task-backend
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      PORT: 5000
      NODE_ENV: production
      CLIENT_URL: ${CLIENT_URL:-https://task-management-frontend-psi-ruddy.vercel.app/}
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: ${DB_NAME:-task_management}
      DB_USER: root
      DB_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpassword}
      JWT_SECRET: ${JWT_SECRET:-change_this_secret}
      ACCESS_TOKEN_EXPIRES_IN: 15m
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-change_this_refresh_secret}
      REFRESH_TOKEN_EXPIRES_IN: 7d
    ports:
      - '5000:5000'

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-https://task-management-backend-mu-three.vercel.app/api}
    container_name: task-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - '5173:80'

volumes:
  mysql_data:
